<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Candlestick chart logo (dark variant) -->
  <!-- Candle 1 (bullish) -->
  <line x1="5" y1="3" x2="5" y2="5" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="3.5" y="5" width="3" height="6" rx="0.3" fill="#fff"/>
  <line x1="5" y1="11" x2="5" y2="14" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Candle 2 (bearish) -->
  <line x1="10" y1="5" x2="10" y2="7" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="8.5" y="7" width="3" height="5" rx="0.3" fill="none" stroke="#fff" stroke-width="1"/>
  <line x1="10" y1="12" x2="10" y2="15" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Candle 3 (bullish) -->
  <line x1="15" y1="4" x2="15" y2="6" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="13.5" y="6" width="3" height="7" rx="0.3" fill="#fff"/>
  <line x1="15" y1="13" x2="15" y2="16" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Candle 4 (bearish) -->
  <line x1="20" y1="6" x2="20" y2="8" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="18.5" y="8" width="3" height="4" rx="0.3" fill="none" stroke="#fff" stroke-width="1"/>
  <line x1="20" y1="12" x2="20" y2="14" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Baseline -->
  <line x1="2" y1="20" x2="22" y2="20" stroke="#fff" stroke-width="1" opacity="0.4"/>
</svg>
