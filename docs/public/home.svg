  <line x1="110" y1="146" x2="110" y2="160" stroke="#888" stroke-width="1.5"/>

  <line x1="150" y1="100" x2="150" y2="112" stroke="#888" stroke-width="1.5"/>
  <rect x="145" y="110" width="10" height="12" rx="1" fill="none" stroke="#888" stroke-width="1.5"/>
  <line x1="150" y1="122" x2="150" y2="135" stroke="#888" stroke-width="1.5"/>

  <line x1="190" y1="85" x2="190" y2="98" stroke="#888" stroke-width="1.5"/>
