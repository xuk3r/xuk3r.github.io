<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none" opacity="0.15">
  <!-- Abstract candlestick chart background illustration -->
  <!-- Grid lines -->
  <line x1="0" y1="60" x2="400" y2="60" stroke="#888" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#888" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="0" y1="180" x2="400" y2="180" stroke="#888" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="0" y1="240" x2="400" y2="240" stroke="#888" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Line chart -->
  <polyline points="0,200 40,180 80,150 120,160 160,130 200,110 240,120 280,90 320,100 360,80 400,70"
    stroke="#888" stroke-width="1.5" fill="none"/>

  <!-- Candles -->
  <line x1="30" y1="140" x2="30" y2="160" stroke="#888" stroke-width="1.5"/>
  <rect x="25" y="150" width="10" height="20" rx="1" fill="#888"/>
