  <line x1="230" y1="80" x2="230" y2="92" stroke="#888" stroke-width="1.5"/>
  <rect x="225" y="90" width="10" height="14" rx="1" fill="none" stroke="#888" stroke-width="1.5"/>
  <line x1="230" y1="104" x2="230" y2="118" stroke="#888" stroke-width="1.5"/>

  <line x1="270" y1="65" x2="270" y2="78" stroke="#888" stroke-width="1.5"/>
  <rect x="265" y="75" width="10" height="20" rx="1" fill="#888"/>
  <line x1="270" y1="95" x2="270" y2="108" stroke="#888" stroke-width="1.5"/>

  <line x1="310" y1="72" x2="310" y2="84" stroke="#888" stroke-width="1.5"/>
  <rect x="305" y="82" width="10" height="10" rx="1" fill="none" stroke="#888" stroke-width="1.5"/>
  <line x1="310" y1="92" x2="310" y2="105" stroke="#888" stroke-width="1.5"/>

  <line x1="350" y1="58" x2="350" y2="68" stroke="#888" stroke-width="1.5"/>
  <rect x="345" y="65" width="10" height="18" rx="1" fill="#888"/>
  <line x1="350" y1="83" x2="350" y2="95" stroke="#888" stroke-width="1.5"/>

  <!-- Volume bars at bottom -->
  <rect x="20" y="255" width="18" height="30" rx="1" fill="#888" opacity="0.5"/>
  <rect x="60" y="260" width="18" height="25" rx="1" fill="#888" opacity="0.5"/>
  <rect x="100" y="250" width="18" height="35" rx="1" fill="#888" opacity="0.5"/>
  <rect x="140" y="258" width="18" height="27" rx="1" fill="#888" opacity="0.5"/>
  <rect x="180" y="245" width="18" height="40" rx="1" fill="#888" opacity="0.5"/>
  <rect x="220" y="262" width="18" height="23" rx="1" fill="#888" opacity="0.5"/>
  <rect x="260" y="252" width="18" height="33" rx="1" fill="#888" opacity="0.5"/>
